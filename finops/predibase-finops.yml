description: >-
  FinOps view of Predibase spend. Predibase bills three usage meters:
  serverless inference per token (scaled by model size), batch inference at a
  flat per-million-token rate, fine-tuning (training) per token of training data
  scaled by base-model size, and dedicated deployments per GPU-hour by
  accelerator. LoRAX multi-LoRA serving packs many adapters onto one GPU,
  reducing dedicated serving cost versus one deployment per fine-tuned model.
notes: >-
  Per-model and per-accelerator rates are subject to change; verify against the
  Predibase pricing page during reconciliation. Predibase was acquired by Rubrik
  in June 2025.
sources:
- https://predibase.com/pricing
- https://docs.predibase.com
- https://focus.finops.org/focus-specification/v1-3/
