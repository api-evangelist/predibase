  ProviderName: Predibase
  PublisherName: Predibase
  InvoiceIssuerName: Predibase
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: serverless_inference_tokens
  description: Tokens served via serverless / shared endpoints, billed per 1M tokens scaled by model size.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
  - deployment
- name: batch_inference_tokens
  description: Tokens served via batch inference jobs, billed at a flat per-1M-token rate.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
- name: finetuning_training_tokens
  description: Training tokens consumed by supervised / GRPO fine-tuning jobs, billed per 1M tokens scaled by base-model size.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - base_model
  - task
- name: dedicated_gpu_hours
  description: GPU-hours consumed by dedicated / private deployments, billed per accelerator type (A10, A100, H100).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - deployment
  - accelerator
principles:
- name: Visibility
  description: Pull Predibase usage exports; inspect token burn per deployment and GPU-hours per accelerator.
- name: Allocation
  description: Tag API tokens and deployments per workload/team; map adapters and repos to internal cost centers.
- name: Optimization
  description: Prefer serverless / batch for spiky or non-realtime traffic; consolidate many fine-tuned adapters onto one LoRAX-enabled deployment instead of one deployment per model; right-size the GPU accelerator; pick smaller base models when sufficient.
- name: Accountability
  description: Assign owners per project/deployment; review token and GPU-hour spend monthly against budget.
